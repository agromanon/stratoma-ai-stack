_format_version: "2.1"

services:
  - name: supabase-auth
    url: http://supabase-auth:9999
    routes:
      - name: auth-api
        paths:
          - /auth
        strip_path: false

  - name: supabase-rest
    url: http://supabase-rest:3000
    routes:
      - name: rest-api
        paths:
          - /rest
        strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - "*"
      methods:
        - GET
        - POST
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
      credentials: true
